apiVersion: v1
kind: ConfigMap
metadata:
  name: my-website-config
  namespace: student-apps
data:
  index.html: |
    <!DOCTYPE html>
    <html>
    <head><title>GitOps Demo</title></head>
    <body style="background-color: #2d3436; color: white; text-align: center; padding-top: 50px;">
      <h1>Hello Class 1125!</h1>
      <p>Deployed via ArgoCD</p>
    </body>
    </html>
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: custom-html
data:
  index.html: |
    <!DOCTYPE html>
    <html>
    <head>
      <title>Custom Kubernetes Page</title>
      <style>
        body {
          font-family: Arial, sans-serif;
          background: #f4f6f8;
          text-align: center;
          padding-top: 80px;
        }
        h1 {
          color: #2c3e50;
        }
        p {
          color: #555;
          font-size: 18px;
        }
      </style>
    </head>
    <body>
      <h1>Hello from Kubernetes!</h1>
      <p>This is a custom HTML page served by Nginx.</p>
    </body>
    </html>

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: custom-html-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: custom-html
  template:
    metadata:
      labels:
        app: custom-html
    spec:
      containers:
        - name: nginx
          image: nginx:latest
          ports:
            - containerPort: 80
          volumeMounts:
            - name: html-volume
              mountPath: /usr/share/nginx/html/index.html
              subPath: index.html
      volumes:
        - name: html-volume
          configMap:
            name: custom-html

---
apiVersion: v1
kind: Service
metadata:
  name: custom-html-service
spec:
  type: NodePort
  selector:
    app: custom-html
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080
